name: Build

on:
  push:
    branches: [main, 'dev/*']
    tags:     ['v*']

jobs:
  # ── CI build — runs on every branch ────────────────────────────────────────
  # Linux x86_64 + WASM only: fast feedback without macOS runner cost.
  ci:
    if: github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - name: linux
            os:   ubuntu-latest
            run: |
              sudo apt-get update && sudo apt-get install -y libasound2-dev
              cargo build --target x86_64-unknown-linux-gnu

          - name: windows
            os:   windows-latest
            run:  cargo build --target x86_64-pc-windows-msvc

          - name: wasm
            os:   ubuntu-latest
            run: |
              curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
              cd web && wasm-pack build --target web --out-dir pkg --dev

    runs-on: ${{ matrix.os }}
    name: ci / ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,wasm32-unknown-unknown,x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-${{ matrix.name }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ci-${{ matrix.name }}-cargo-

      - name: Build
        run: ${{ matrix.run }}

  # ── Full build — runs on main and tags ──────────────────────────────────────
  build:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_bin:    audio_viz-linux-x86_64
            artifact_deb:    audio_viz-linux-x86_64-deb
            artifact_appimg: audio_viz-linux-x86_64-appimage
            make_deb:        true
            make_appimage:   true

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_bin:    audio_viz-macos-x86_64
            make_deb:        false
            make_appimage:   false

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_bin:    audio_viz-macos-aarch64
            make_deb:        false
            make_appimage:   false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_bin:    audio_viz-windows-x86_64
            make_deb:        false
            make_appimage:   false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ALSA headers (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # ── Raw binary ──────────────────────────────────────────────────────────
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_bin }}
          path: |
            target/${{ matrix.target }}/release/audio_viz
            target/${{ matrix.target }}/release/audio_viz.exe
          if-no-files-found: error

      # ── Debian package (Linux only) ─────────────────────────────────────────
      - name: Build .deb package
        if: matrix.make_deb
        run: |
          BIN=target/${{ matrix.target }}/release/audio_viz
          VERSION=$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")

          PKG=audio_viz_${VERSION}_amd64
          mkdir -p ${PKG}/DEBIAN
          mkdir -p ${PKG}/usr/bin
          mkdir -p ${PKG}/usr/share/doc/audio_viz

          cp ${BIN} ${PKG}/usr/bin/audio_viz
          chmod 755 ${PKG}/usr/bin/audio_viz

          cat > ${PKG}/DEBIAN/control << CONTROL
          Package: audio-viz
          Version: ${VERSION}
          Section: sound
          Priority: optional
          Architecture: amd64
          Depends: libasound2
          Maintainer: audio_viz contributors
          Description: Multi-mode terminal audio visualizer
           A terminal-based audio visualizer with multiple display modes
           including spectrum analyzer, oscilloscope, matrix rain, radial
           spectrum, Lissajous XY scope, fire, and VU meter.
          CONTROL

          printf 'See the project repository for license information.\n' \
            > ${PKG}/usr/share/doc/audio_viz/copyright

          dpkg-deb --build --root-owner-group ${PKG}

      - name: Upload .deb artifact
        if: matrix.make_deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_deb }}
          path: "*.deb"
          if-no-files-found: error

      # ── AppImage (Linux only) ───────────────────────────────────────────────
      - name: Build AppImage
        if: matrix.make_appimage
        run: |
          BIN=target/${{ matrix.target }}/release/audio_viz

          curl -L -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          # squashfs-root/AppRun is the real binary; use it directly to avoid
          # the FUSE requirement that GitHub runners do not satisfy.
          APPIMAGETOOL=./squashfs-root/AppRun

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp ${BIN} AppDir/usr/bin/audio_viz

          cat > AppDir/usr/share/applications/audio_viz.desktop << DESKTOP
          [Desktop Entry]
          Name=audio_viz
          Exec=audio_viz
          Icon=audio_viz
          Type=Application
          Categories=AudioVideo;Audio;
          Terminal=true
          DESKTOP

          cp AppDir/usr/share/applications/audio_viz.desktop AppDir/audio_viz.desktop

          # 1x1 placeholder PNG — replace with a real icon if desired
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" \
            | base64 -d > AppDir/usr/share/icons/hicolor/256x256/apps/audio_viz.png
          cp AppDir/usr/share/icons/hicolor/256x256/apps/audio_viz.png AppDir/audio_viz.png

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/sh
          exec "$(dirname "$(readlink -f "$0")")/usr/bin/audio_viz" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          ARCH=x86_64 ${APPIMAGETOOL} AppDir audio_viz-x86_64.AppImage

      - name: Upload AppImage artifact
        if: matrix.make_appimage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_appimg }}
          path: "*.AppImage"
          if-no-files-found: error

  # ── GitHub Release (tag pushes only) ───────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir release_assets

          cp dist/audio_viz-linux-x86_64/audio_viz         release_assets/audio_viz-linux-x86_64
          cp dist/audio_viz-macos-x86_64/audio_viz         release_assets/audio_viz-macos-x86_64
          cp dist/audio_viz-macos-aarch64/audio_viz        release_assets/audio_viz-macos-aarch64
          cp dist/audio_viz-windows-x86_64/audio_viz.exe   release_assets/audio_viz-windows-x86_64.exe
          cp dist/audio_viz-linux-x86_64-deb/*.deb         release_assets/
          cp dist/audio_viz-linux-x86_64-appimage/*.AppImage release_assets/

          git archive --format=tar.gz \
            --prefix=audio_viz-${GITHUB_REF_NAME}/ \
            -o release_assets/audio_viz-${GITHUB_REF_NAME}-source.tar.gz \
            HEAD

          ls -lh release_assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "audio_viz ${{ github.ref_name }}"
          generate_release_notes: true
          files: release_assets/*

  # ── Web / GitHub Pages ────────────────────────────────────────────────────
  # Runs on main, tags, and dev/* branches.
  # The deploy jobs below decide where to push the result.
  web:
    if: |
      github.ref == 'refs/heads/main'       ||
      startsWith(github.ref, 'refs/tags/')  ||
      startsWith(github.ref, 'refs/heads/dev/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: wasm-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: wasm-cargo-

      - name: Build WASM package
        working-directory: web
        run: wasm-pack build --target web --out-dir pkg --release

      - name: Assemble site
        run: |
          mkdir site
          cp web/index.html           site/
          cp web/main.js              site/
          cp web/audio.js             site/
          cp web/renderer.js          site/
          cp web/processor.worklet.js site/
          cp -r web/pkg               site/pkg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  # ── Deploy to GitHub Pages — main ─────────────────────────────────────────
  deploy-pages:
    needs: web
    if: github.ref == 'refs/heads/main' && github.repository == 'Nitepone/audio_viz'
    runs-on: ubuntu-latest
    permissions:
      pages:    write
      id-token: write
    environment:
      name: github-pages
      url:  ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
