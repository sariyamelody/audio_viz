name: Sync upstream

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check for upstream changes
        id: check
        run: |
          git remote add upstream https://github.com/Nitepone/audio_viz.git
          git fetch upstream main --no-tags
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "synced=true" >> $GITHUB_OUTPUT
          else
            echo "synced=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream changes
        if: steps.check.outputs.synced == 'false'
        run: |
          git reset --hard upstream/main
          git push --force-with-lease

      - name: Rebase fork-meta onto main
        if: steps.check.outputs.synced == 'false'
        run: |
          git fetch origin sariyamelody/fork-meta
          git checkout -b fork-meta origin/sariyamelody/fork-meta
          git rebase main
          git push --force-with-lease origin HEAD:sariyamelody/fork-meta