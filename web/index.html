<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>audio_viz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #c0c0c0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code',
                   'Consolas', 'Menlo', monospace;
      overflow: hidden;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    #canvas {
      display: block;
      flex: 1;
      width: 100%;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 12px;
      background: #0a0a0a;
      border-top: 1px solid #1a1a1a;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar label {
      font-size: 12px;
      color: #555;
      user-select: none;
    }

    #viz-select {
      background: #111;
      color: #c0c0c0;
      border: 1px solid #333;
      padding: 3px 8px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }
    #viz-select:focus { border-color: #555; }

    #start-btn {
      background: #111;
      color: #c0c0c0;
      border: 1px solid #333;
      padding: 3px 14px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s;
    }
    #start-btn:hover  { border-color: #666; }
    #start-btn:active { background: #1a1a1a; }

    #status {
      font-size: 12px;
      color: #444;
      margin-left: auto;
    }

    /* ── Overlay (mic permission prompt) ────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.92);
      z-index: 10;
      gap: 18px;
    }
    #overlay h1 { font-size: 20px; color: #c0c0c0; letter-spacing: 0.05em; }
    #overlay p  { font-size: 13px; color: #555; text-align: center; max-width: 320px; }
    #overlay button {
      background: #111;
      color: #c0c0c0;
      border: 1px solid #444;
      padding: 8px 28px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    #overlay button:hover { border-color: #888; }
    #overlay.hidden { display: none; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="toolbar">
  <label for="viz-select">Visualizer</label>
  <select id="viz-select"></select>
  <button id="start-btn">Start</button>
  <span id="status">Waiting for microphone…</span>
</div>

<div id="overlay">
  <h1>audio_viz</h1>
  <p>Microphone access is required. Click Start and accept the browser permission prompt.</p>
  <button id="overlay-start-btn">Start</button>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
